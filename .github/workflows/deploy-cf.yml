name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ Error: CLOUDFLARE_API_TOKEN is not set"
            echo "Please add it in Settings → Secrets and variables → Actions"
            echo "Visit: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ Error: CLOUDFLARE_ACCOUNT_ID is not set"
            echo "Please add it in Settings → Secrets and variables → Actions"
            echo "Visit: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          if [ -z "${{ secrets.RELAY_API_KEY }}" ]; then
            echo "❌ Error: RELAY_API_KEY is not set"
            echo "Please add it in Settings → Secrets and variables → Actions"
            echo "Visit: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          echo "✅ All required secrets are configured"

      - name: Provision Cloudflare resources
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"

          # Check and create D1 database if not exists, then extract database_id
          D1_EXISTS=$(pnpm exec wrangler d1 list --json | jq -r '.[] | select(.name == "ai-relay") | .uuid')
          if [ -z "$D1_EXISTS" ]; then
            echo "Creating D1 database: ai-relay"
            D1_OUTPUT=$(pnpm exec wrangler d1 create ai-relay --json)
            echo "$D1_OUTPUT"
            DATABASE_ID=$(echo "$D1_OUTPUT" | jq -r '.uuid')
          else
            echo "D1 database ai-relay already exists"
            DATABASE_ID="$D1_EXISTS"
          fi

          if [ -n "$DATABASE_ID" ] && [ "$DATABASE_ID" != "null" ]; then
            echo "D1 database_id: $DATABASE_ID"
            # Escape any special characters for sed
            ESCAPED_ID=$(printf '%s\n' "$DATABASE_ID" | sed 's/[&/\]/\\&/g')
            # Update wrangler.toml with database_id
            if grep -q "database_id" wrangler.toml; then
              sed -i.bak "s|database_id = .*|database_id = \"${ESCAPED_ID}\"|" wrangler.toml
            else
              # Insert database_id after database_name line
              sed -i.bak "/database_name = \"ai-relay\"/a database_id = \"${ESCAPED_ID}\"" wrangler.toml
            fi
          else
            echo "❌ Error: Failed to obtain D1 database_id"
            exit 1
          fi

          # Check and create KV namespace if not exists, then extract id
          # Note: some wrangler versions don't support --json for KV commands
          KV_LIST=$(pnpm exec wrangler kv namespace list --json 2>/dev/null || pnpm exec wrangler kv namespace list 2>/dev/null || echo "")
          KV_EXISTS=$(echo "$KV_LIST" | jq -r '.[] | select(.title == "ai-relay") | .id' 2>/dev/null || echo "")
          if [ -z "$KV_EXISTS" ]; then
            # jq failed or no match — try text parsing as fallback
            KV_EXISTS=$(echo "$KV_LIST" | grep "ai-relay" | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
          fi

          if [ -z "$KV_EXISTS" ]; then
            echo "Creating KV namespace: ai-relay"
            KV_CREATE_OUTPUT=$(pnpm exec wrangler kv namespace create ai-relay 2>&1)
            echo "$KV_CREATE_OUTPUT"
            # Try JSON parsing first, then grep for the id
            KV_ID=$(echo "$KV_CREATE_OUTPUT" | jq -r '.id' 2>/dev/null || echo "")
            if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
              KV_ID=$(echo "$KV_CREATE_OUTPUT" | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
            fi
          else
            echo "KV namespace ai-relay already exists"
            KV_ID="$KV_EXISTS"
          fi

          if [ -n "$KV_ID" ] && [ "$KV_ID" != "null" ]; then
            echo "KV namespace id: $KV_ID"
            ESCAPED_KV_ID=$(printf '%s\n' "$KV_ID" | sed 's/[&/\]/\\&/g')
            # Update wrangler.toml with KV id
            if grep -q "^id = " wrangler.toml; then
              sed -i.bak "s|^id = .*|id = \"${ESCAPED_KV_ID}\"|" wrangler.toml
            else
              # Insert id after binding = "KV" line
              sed -i.bak "/binding = \"KV\"/a id = \"${ESCAPED_KV_ID}\"" wrangler.toml
            fi
          else
            echo "❌ Error: Failed to obtain KV namespace id"
            exit 1
          fi

          rm -f wrangler.toml.bak
          echo "Updated wrangler.toml:"
          cat wrangler.toml

      - name: Build for Cloudflare Pages
        run: pnpm exec opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion
        env:
          NODE_ENV: production

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"
          pnpm exec wrangler d1 migrations apply ai-relay --remote

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"
          pnpm exec wrangler pages deploy .vercel/output/static --project-name=ai-relay

      - name: Configure environment variables
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"

          # Configure required environment variables
          if [ -n "${{ secrets.RELAY_API_KEY }}" ]; then
            echo "${{ secrets.RELAY_API_KEY }}" | pnpm exec wrangler pages secret put RELAY_API_KEY --project-name=ai-relay
          fi

          if [ -n "${{ secrets.RELAY_ADMIN_KEY }}" ]; then
            echo "${{ secrets.RELAY_ADMIN_KEY }}" | pnpm exec wrangler pages secret put RELAY_ADMIN_KEY --project-name=ai-relay
          fi

          if [ -n "${{ secrets.RELAY_SIGNING_SECRET }}" ]; then
            echo "${{ secrets.RELAY_SIGNING_SECRET }}" | pnpm exec wrangler pages secret put RELAY_SIGNING_SECRET --project-name=ai-relay
          fi

          if [ -n "${{ secrets.CRON_SECRET }}" ]; then
            echo "${{ secrets.CRON_SECRET }}" | pnpm exec wrangler pages secret put CRON_SECRET --project-name=ai-relay
          fi

          # Set CF_PAGES flag
          echo "1" | pnpm exec wrangler pages secret put CF_PAGES --project-name=ai-relay
