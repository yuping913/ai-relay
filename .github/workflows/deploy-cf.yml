name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, pre-release]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == (vars.CLOUDFLARE_DEPLOY_BRANCH || 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'ai-relay' }}
      CLOUDFLARE_PAGES_PRODUCTION_BRANCH: ${{ vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH || vars.CLOUDFLARE_DEPLOY_BRANCH || 'main' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ Error: CLOUDFLARE_API_TOKEN is not set"
            echo "Please add it in Settings → Secrets and variables → Actions"
            echo "Visit: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ Error: CLOUDFLARE_ACCOUNT_ID is not set"
            echo "Please add it in Settings → Secrets and variables → Actions"
            echo "Visit: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          if [ -z "${{ secrets.RELAY_API_KEY }}" ]; then
            echo "❌ Error: RELAY_API_KEY is not set"
            echo "Please add it in Settings → Secrets and variables → Actions"
            echo "Visit: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          echo "✅ All required secrets are configured"

      - name: Provision Cloudflare resources
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # ─── D1 Database ───────────────────────────────────────────
          echo "=== Provisioning D1 database ==="

          # Try to get database ID from existing databases
          echo "Fetching D1 database list..."
          D1_LIST_OUT=$(pnpm exec wrangler d1 list --json 2>&1 || pnpm exec wrangler d1 list 2>&1 || echo "[]")
          echo "D1 list output:"
          echo "$D1_LIST_OUT" | head -20

          # Try JSON parsing first
          DATABASE_ID=$(echo "$D1_LIST_OUT" | jq -r '.[] | select(.name == "ai-relay") | .uuid' 2>/dev/null || echo "")

          # Fallback: grep UUID from any format (JSON or plain text)
          if [ -z "$DATABASE_ID" ] || [ "$DATABASE_ID" = "null" ]; then
            echo "JSON parsing failed, trying regex extraction..."
            # Look for ai-relay followed by UUID pattern
            DATABASE_ID=$(echo "$D1_LIST_OUT" | grep -A 5 -i "ai-relay" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")
          fi

          # If still not found, try creating it
          if [ -z "$DATABASE_ID" ] || [ "$DATABASE_ID" = "null" ]; then
            echo "D1 database not found, attempting to create..."
            CREATE_OUT=$(pnpm exec wrangler d1 create ai-relay 2>&1 || true)
            echo "$CREATE_OUT"

            # Extract UUID from create output
            DATABASE_ID=$(echo "$CREATE_OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")

            # If creation failed because it exists, fetch the list again with more attempts
            if [ -z "$DATABASE_ID" ] || [ "$DATABASE_ID" = "null" ]; then
              if echo "$CREATE_OUT" | grep -qi "already exists\|name already in use"; then
                echo "Database exists but UUID not found. Retrying fetch with verbose output..."
                sleep 2  # Give Cloudflare API a moment

                # Try multiple fetch attempts
                for i in 1 2 3; do
                  echo "Attempt $i to fetch database list..."
                  D1_LIST_OUT=$(pnpm exec wrangler d1 list 2>&1 || echo "")
                  echo "$D1_LIST_OUT"

                  # Try all possible extraction methods
                  DATABASE_ID=$(echo "$D1_LIST_OUT" | jq -r '.[] | select(.name == "ai-relay") | .uuid' 2>/dev/null || echo "")
                  if [ -z "$DATABASE_ID" ] || [ "$DATABASE_ID" = "null" ]; then
                    DATABASE_ID=$(echo "$D1_LIST_OUT" | grep -A 5 -i "ai-relay" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")
                  fi

                  if [ -n "$DATABASE_ID" ] && [ "$DATABASE_ID" != "null" ]; then
                    echo "✅ Found database UUID on attempt $i"
                    break
                  fi

                  sleep 2
                done
              fi
            fi
          else
            echo "✅ D1 database already exists"
          fi

          echo ""
          echo "D1 database_id: ${DATABASE_ID:-<empty>}"

          if [ -z "$DATABASE_ID" ] || [ "$DATABASE_ID" = "null" ]; then
            echo "❌ Failed to obtain D1 database_id after all attempts"
            echo ""
            echo "Debug information:"
            echo "Last D1 list output:"
            echo "$D1_LIST_OUT"
            exit 1
          fi

          echo "✅ Successfully obtained D1 database_id: $DATABASE_ID"

          # Inject database_id into wrangler.toml
          if grep -q "database_id" wrangler.toml; then
            sed -i "s|database_id = .*|database_id = \"${DATABASE_ID}\"|" wrangler.toml
          else
            sed -i "/database_name = \"ai-relay\"/a database_id = \"${DATABASE_ID}\"" wrangler.toml
          fi

          # ─── KV Namespace ──────────────────────────────────────────
          echo ""
          echo "=== Provisioning KV namespace ==="

          # wrangler kv namespace list outputs JSON by default (--json is NOT supported).
          # pnpm prints progress lines ("Already up to date", "Done in ...") to stdout,
          # so strip everything before the first "[" to isolate the JSON array for jq.
          KV_LIST=$(pnpm exec wrangler kv namespace list 2>/dev/null | awk '/^\[/{f=1} f' || echo "[]")
          [ -z "$KV_LIST" ] && KV_LIST="[]"
          echo "KV namespaces found: $(echo "$KV_LIST" | jq 'length' 2>/dev/null || echo 'unknown')"

          # Search for existing namespace.
          # Possible titles: wrangler may generate "KV", "ai-relay-KV", or legacy variants.
          KV_ID=""
          for TITLE in "KV" "ai-relay-KV" "ai-relay" "ai-relay-ai-relay"; do
            FOUND=$(echo "$KV_LIST" | jq -r ".[] | select(.title == \"${TITLE}\") | .id" 2>/dev/null || echo "")
            if [ -n "$FOUND" ] && [ "$FOUND" != "null" ]; then
              KV_ID="$FOUND"
              echo "Found existing KV namespace: title=${TITLE}, id=${KV_ID}"
              break
            fi
          done

          if [ -z "$KV_ID" ]; then
            echo "No existing KV namespace found, creating one..."
            KV_OUTPUT=$(pnpm exec wrangler kv namespace create KV 2>&1 || true)
            echo "$KV_OUTPUT"

            # If wrangler reports "already exists", re-fetch the list and find it
            if echo "$KV_OUTPUT" | grep -qi "already exists"; then
              echo "Namespace already exists (title conflict); re-fetching list to obtain id..."
              KV_LIST=$(pnpm exec wrangler kv namespace list 2>/dev/null | awk '/^\[/{f=1} f' || echo "[]")
              [ -z "$KV_LIST" ] && KV_LIST="[]"
              for TITLE in "KV" "ai-relay-KV" "ai-relay" "ai-relay-ai-relay"; do
                FOUND=$(echo "$KV_LIST" | jq -r ".[] | select(.title == \"${TITLE}\") | .id" 2>/dev/null || echo "")
                if [ -n "$FOUND" ] && [ "$FOUND" != "null" ]; then
                  KV_ID="$FOUND"
                  echo "Recovered KV namespace: title=${TITLE}, id=${KV_ID}"
                  break
                fi
              done
            else
              # Extract id from create output: try JSON first, then 32-char hex fallback
              KV_ID=$(echo "$KV_OUTPUT" | jq -r '.id' 2>/dev/null || echo "")
              if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
                KV_ID=$(echo "$KV_OUTPUT" | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
              fi
            fi
          fi

          echo "KV namespace id: $KV_ID"

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "❌ Failed to obtain KV namespace id"
            echo "Debug: KV list output was:"
            echo "$KV_LIST" | head -20
            exit 1
          fi

          # Inject KV id into wrangler.toml
          if grep -q "^id = " wrangler.toml; then
            sed -i "s|^id = .*|id = \"${KV_ID}\"|" wrangler.toml
          else
            sed -i "/binding = \"KV\"/a id = \"${KV_ID}\"" wrangler.toml
          fi

          # ─── Verify ────────────────────────────────────────────────
          echo ""
          echo "=== Final wrangler.toml ==="
          cat wrangler.toml

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create project if it doesn't exist; ignore error if it already does
          pnpm exec wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT_NAME" --production-branch "$CLOUDFLARE_PAGES_PRODUCTION_BRANCH" 2>&1 || true

      - name: Build for Cloudflare Pages
        run: pnpm exec opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion
        env:
          NODE_ENV: production

      - name: Adapt Build Output for Cloudflare Pages
        run: |
          # Copy static assets to the root of .open-next so they can be served directly by Pages
          if [ -d ".open-next/assets" ]; then
            cp -r .open-next/assets/* .open-next/
          fi

          # Materialize statically prerendered app routes so Pages can serve them
          # without passing `/` and `/admin` through the worker.
          CACHE_DIR="$(find .open-next/cache -mindepth 1 -maxdepth 1 -type d | head -1)"
          if [ -z "$CACHE_DIR" ]; then
            echo "❌ No OpenNext cache directory found"
            exit 1
          fi

          CACHE_DIR="$CACHE_DIR" node -e '
            const fs = require("fs");
            const path = require("path");

            const cacheDir = process.env.CACHE_DIR;
            const outputRoot = ".open-next";
            const entries = [
              ["index.cache", "index.html"],
              ["admin.cache", path.join("admin", "index.html")],
              ["_not-found.cache", "404.html"]
            ];

            for (const [source, target] of entries) {
              const input = path.join(cacheDir, source);
              if (!fs.existsSync(input)) continue;
              const payload = JSON.parse(fs.readFileSync(input, "utf8"));
              if (!payload || !payload.html) continue;
              const output = path.join(outputRoot, target);
              fs.mkdirSync(path.dirname(output), { recursive: true });
              fs.writeFileSync(output, payload.html);
            }
          '

          # Rename worker.js to _worker.js to enable Pages Functions
          if [ -f ".open-next/worker.js" ]; then
            mv .open-next/worker.js .open-next/_worker.js
          fi
          # Tell Cloudflare Pages to serve the prerendered pages directly from CDN.
          echo '{"version":1,"include":["/*"],"exclude":["/","/admin","/_next/static/*","/favicon.ico","/*.png","/*.ico","/*.txt","/*.svg"]}' > .open-next/_routes.json

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"
          pnpm exec wrangler d1 migrations apply ai-relay --remote

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"
          pnpm exec wrangler pages deploy .open-next --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch="${GITHUB_REF_NAME}"

      - name: Configure environment variables
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SYNC_RELAY_API_KEY: ${{ secrets.RELAY_API_KEY || vars.RELAY_API_KEY }}
          SYNC_RELAY_ADMIN_KEY: ${{ secrets.RELAY_ADMIN_KEY || vars.RELAY_ADMIN_KEY }}
          SYNC_RELAY_SIGNING_SECRET: ${{ secrets.RELAY_SIGNING_SECRET || vars.RELAY_SIGNING_SECRET }}
          SYNC_CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET }}
          SYNC_OPENAI_KEYS: ${{ secrets.OPENAI_KEYS || vars.OPENAI_KEYS }}
          SYNC_CLAUDE_KEYS: ${{ secrets.CLAUDE_KEYS || vars.CLAUDE_KEYS }}
          SYNC_DEEPSEEK_KEYS: ${{ secrets.DEEPSEEK_KEYS || vars.DEEPSEEK_KEYS }}
          SYNC_XIAOMI_KEYS: ${{ secrets.XIAOMI_KEYS || vars.XIAOMI_KEYS }}
          SYNC_XIAOMI_CODING_KEYS: ${{ secrets.XIAOMI_CODING_KEYS || vars.XIAOMI_CODING_KEYS }}
          SYNC_XIAOMIMIMO_SGP_CODING_KEYS: ${{ secrets.XIAOMIMIMO_SGP_CODING_KEYS || vars.XIAOMIMIMO_SGP_CODING_KEYS }}
          SYNC_OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
          SYNC_CLAUDE_BASE_URL: ${{ secrets.CLAUDE_BASE_URL || vars.CLAUDE_BASE_URL }}
          SYNC_DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || vars.DEEPSEEK_BASE_URL }}
          SYNC_XIAOMI_BASE_URL: ${{ secrets.XIAOMI_BASE_URL || vars.XIAOMI_BASE_URL }}
          SYNC_XIAOMI_CODING_BASE_URL: ${{ secrets.XIAOMI_CODING_BASE_URL || vars.XIAOMI_CODING_BASE_URL }}
          SYNC_XIAOMIMIMO_SGP_CODING_BASE_URL: ${{ secrets.XIAOMIMIMO_SGP_CODING_BASE_URL || vars.XIAOMIMIMO_SGP_CODING_BASE_URL }}
          SYNC_RELAY_DAILY_LIMIT: ${{ secrets.RELAY_DAILY_LIMIT || vars.RELAY_DAILY_LIMIT }}
          SYNC_RELAY_MONTHLY_LIMIT: ${{ secrets.RELAY_MONTHLY_LIMIT || vars.RELAY_MONTHLY_LIMIT }}
          SYNC_RELAY_MAX_CONCURRENT: ${{ secrets.RELAY_MAX_CONCURRENT || vars.RELAY_MAX_CONCURRENT }}
          SYNC_RELAY_MAX_QUEUE: ${{ secrets.RELAY_MAX_QUEUE || vars.RELAY_MAX_QUEUE }}
          SYNC_RELAY_KEY_POOL_VERSION_CHECK_TTL_MS: ${{ secrets.RELAY_KEY_POOL_VERSION_CHECK_TTL_MS || vars.RELAY_KEY_POOL_VERSION_CHECK_TTL_MS }}
          SYNC_RELAY_KV_KEY_USAGE_MODE: ${{ secrets.RELAY_KV_KEY_USAGE_MODE || vars.RELAY_KV_KEY_USAGE_MODE }}
          SYNC_RELAY_KV_USAGE_SAMPLE_RATE: ${{ secrets.RELAY_KV_USAGE_SAMPLE_RATE || vars.RELAY_KV_USAGE_SAMPLE_RATE }}
          SYNC_RELAY_KV_KEY_USAGE_SAMPLE_RATE: ${{ secrets.RELAY_KV_KEY_USAGE_SAMPLE_RATE || vars.RELAY_KV_KEY_USAGE_SAMPLE_RATE }}
          SYNC_RELAY_KV_ERROR_DETAIL_SAMPLE_RATE: ${{ secrets.RELAY_KV_ERROR_DETAIL_SAMPLE_RATE || vars.RELAY_KV_ERROR_DETAIL_SAMPLE_RATE }}
          SYNC_ENABLE_REQUEST_LOGS: ${{ secrets.ENABLE_REQUEST_LOGS || vars.ENABLE_REQUEST_LOGS }}
          SYNC_REQUEST_LOGS_MAX_ENTRIES: ${{ secrets.REQUEST_LOGS_MAX_ENTRIES || vars.REQUEST_LOGS_MAX_ENTRIES }}
          SYNC_CORS_ORIGINS: ${{ secrets.CORS_ORIGINS || vars.CORS_ORIGINS }}
          SYNC_DEPLOY_URL: ${{ secrets.DEPLOY_URL || vars.DEPLOY_URL }}
        run: |
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN}"
          export CLOUDFLARE_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID}"

          # 动态遍历环境变量中所有以 SYNC_ 开头的变量并推送到 CF Pages
          for var_name in $(env | grep -oE '^SYNC_[A-Z0-9_]+' | sort -u); do
            # 提取原变量名
            target_name="${var_name#SYNC_}"
            # 获取变量的值
            val="${!var_name}"
            
            if [ -n "$val" ]; then
              echo "Syncing $target_name..."
              echo "$val" | pnpm exec wrangler pages secret put "$target_name" --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME"
            fi
          done
